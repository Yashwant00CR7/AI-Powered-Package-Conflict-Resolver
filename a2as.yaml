files:
  "..":
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), ".."]
  agents_path:
    type: literal
    actions: [read]
    params:
      caller: [Path(os.path.abspath(src))]
  base_dir:
    type: variable
    actions: [read]
    params:
      caller: [os.makedirs]
  data_dir:
    type: variable
